{{define "login.html"}}
<!DOCTYPE html>
<html lang="en" class="login-html">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · Moana</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-split">
    <div class="login-panel">
      <div class="login-panel-inner">
        <div class="login-brand">
          <span class="sr-only">Moana</span>
          <span class="brand-wordmark login-brand-wordmark" aria-hidden="true">
            <span class="brand-wordmark-mo">Mo</span><span class="brand-wordmark-ana">ana</span>
          </span>
        </div>

        <h1 class="login-title">Sign in to your account</h1>

        {{if .Error}}
        <p class="alert alert-error login-alert" role="alert">{{.Error}}</p>
        {{end}}

        <form class="login-form" method="post" action="/login">
          <div class="float-field">
            <label class="float-label" for="login-email">Email address</label>
            <input id="login-email" class="float-input" type="email" name="email" required autocomplete="username" placeholder="you@example.com">
          </div>
          <div class="float-field">
            <label class="float-label" for="login-password">Password</label>
            <input id="login-password" class="float-input" type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
          </div>

          <div class="login-row">
            <label class="login-remember">
              <input type="checkbox" name="remember" value="on" class="login-checkbox">
              <span>Remember me</span>
            </label>
            <span class="login-forgot" title="Reset via whoever runs this Moana instance">Forgot password?</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block login-submit">Sign in</button>
        </form>

        <div class="login-divider">
          <span class="login-divider-text">Or continue with</span>
        </div>

        <div class="login-oauth">
          <button type="button" class="login-oauth-btn" disabled title="Not available in this build">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="login-oauth-icon" width="20" height="20"><path d="M12.0003 4.75C13.7703 4.75 15.3553 5.36002 16.6053 6.54998L20.0303 3.125C17.9502 1.19 15.2353 0 12.0003 0C7.31028 0 3.25527 2.69 1.28027 6.60998L5.27028 9.70498C6.21525 6.86002 8.87028 4.75 12.0003 4.75Z" fill="#EA4335"/><path d="M23.49 12.275C23.49 11.49 23.415 10.73 23.3 10H12V14.51H18.47C18.18 15.99 17.34 17.25 16.08 18.1L19.945 21.1C22.2 19.01 23.49 15.92 23.49 12.275Z" fill="#4285F4"/><path d="M5.26498 14.2949C5.02498 13.5699 4.88501 12.7999 4.88501 11.9999C4.88501 11.1999 5.01998 10.4299 5.26498 9.7049L1.275 6.60986C0.46 8.22986 0 10.0599 0 11.9999C0 13.9399 0.46 15.7699 1.28 17.3899L5.26498 14.2949Z" fill="#FBBC05"/><path d="M12.0004 24.0001C15.2404 24.0001 17.9654 22.935 19.9454 21.095L16.0804 18.095C15.0054 18.82 13.6204 19.245 12.0004 19.245C8.8704 19.245 6.21537 17.135 5.2654 14.29L1.27539 17.385C3.25539 21.31 7.3104 24.0001 12.0004 24.0001Z" fill="#34A853"/></svg>
            Google
          </button>
          <button type="button" class="login-oauth-btn" disabled title="Not available in this build">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="login-oauth-icon login-oauth-icon--gh" width="18" height="18"><path fill-rule="evenodd" d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z" clip-rule="evenodd"/></svg>
            GitHub
          </button>
        </div>

        <p class="login-foot muted small">
          Moana © {{.Year}}
          <span aria-hidden="true"> · </span>
          <a class="login-foot-link" href="https://opensource.org/licenses/MIT" rel="license noopener noreferrer" target="_blank">MIT License</a>
          <span aria-hidden="true"> · </span>
          <a class="login-foot-link" href="{{.RepoURL}}" rel="noopener noreferrer" target="_blank">GitHub</a>
        </p>
      </div>
    </div>
    <div class="login-hero" aria-hidden="true">
      <img
        class="login-hero-img"
        src="https://images.unsplash.com/photo-1497215848504-222066450dae?auto=format&amp;fit=crop&amp;w=1920&amp;q=85"
        alt=""
        width="1920"
        height="1280"
        fetchpriority="high"
        decoding="async">
    </div>
  </div>
</body>
</html>
{{end}}
