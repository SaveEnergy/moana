# Air (https://github.com/air-verse/air) — hot-reload for `moana serve`.
# Run via `make dev` (with Vite watch for frontend).

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/moana ./cmd/moana"
  entrypoint = ["./tmp/moana", "serve"]
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js"]
  include_dir = ["cmd", "internal"]
  include_file = ["go.mod", "go.sum"]
  exclude_dir = [
    "tmp",
    "vendor",
    "node_modules",
    "frontend",
    "data",
    "bin",
    "test",
    "test-results",
    "playwright-report",
    ".git",
  ]
  exclude_regex = ["_test\\.go"]
  delay = 400
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true

# Open this URL in the browser — Air injects live-reload on backend restarts.
[proxy]
  enabled = true
  proxy_port = 8090
  app_port = 8080
